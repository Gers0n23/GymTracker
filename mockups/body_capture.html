<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Captura - GymTracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .capture-form {
            padding: 20px;
        }

        .input-card {
            background: var(--glass);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
        }

        .input-card label {
            display: block;
            font-size: 12px;
            opacity: 0.6;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .input-card input {
            background: transparent;
            border: none;
            color: white;
            font-size: 32px;
            font-weight: 700;
            width: 100%;
            outline: none;
        }

        .unit {
            font-size: 18px;
            opacity: 0.5;
            margin-left: 5px;
        }

        .auto-calc {
            background: rgba(3, 218, 198, 0.1);
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
            border: 1px solid rgba(3, 218, 198, 0.2);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header style="display: flex; align-items: center; gap: 15px;">
            <a href="body_metrics.html" style="text-decoration: none; font-size: 20px;">✕</a>
            <h1>Nueva Captura</h1>
        </header>

        <section class="capture-form">
            <div class="input-card animate" style="animation-delay: 0.1s;">
                <label>Peso Corporal</label>
                <div style="display: flex; align-items: baseline;">
                    <input type="number" step="0.1" placeholder="00.0" autofocus>
                    <span class="unit">kg</span>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-card animate" style="animation-delay: 0.2s;">
                    <label>% Grasa</label>
                    <div style="display: flex; align-items: baseline;">
                        <input type="number" step="0.1" placeholder="0.0">
                        <span class="unit">%</span>
                    </div>
                </div>
                <div class="input-card animate" style="animation-delay: 0.3s;">
                    <label>% Músculo</label>
                    <div style="display: flex; align-items: baseline;">
                        <input type="number" step="0.1" placeholder="0.0">
                        <span class="unit">%</span>
                    </div>
                </div>
            </div>

            <div class="card animate" style="animation-delay: 0.4s; margin-bottom: 20px;">
                <h3 style="font-size: 14px; margin-bottom: 15px;">Perímetros (cm)</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="number" class="btn-ghost" style="padding: 10px; text-align: left;"
                        placeholder="Cuello">
                    <input type="number" class="btn-ghost" style="padding: 10px; text-align: left;"
                        placeholder="Cintura">
                    <input type="number" class="btn-ghost" style="padding: 10px; text-align: left;" placeholder="Muslo">
                    <input type="number" class="btn-ghost" style="padding: 10px; text-align: left;"
                        placeholder="Pantorrilla">
                </div>
            </div>

            <div class="card animate"
                style="animation-delay: 0.5s; border: 2px dashed var(--glass-border); text-align: center; padding: 30px;">
                <span style="font-size: 30px; display: block; margin-bottom: 10px;">📸</span>
                <p style="font-size: 12px; opacity: 0.5;">Añadir Foto de Progreso<br>(Almacenada localmente)</p>
            </div>

            <div class="input-card animate" style="animation-delay: 0.4s;">
                <label>Resultado Estimado</label>
                <div class="auto-calc">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span style="font-size: 14px; opacity: 0.8;">IMC calculado:</span>
                        <b style="color: var(--secondary);">24.2</b>
                    </div>
                    <p style="font-size: 11px; opacity: 0.5;">Basado en tu altura registrada de 180cm</p>
                </div>
            </div>

            <button class="btn btn-primary animate"
                style="width: 100%; height: 60px; font-size: 18px; margin-top: 20px; animation-delay: 0.5s;"
                onclick="location.href='body_metrics.html'">GUARDAR REGISTRO</button>
        </section>
    </div>
</body>

</html>
