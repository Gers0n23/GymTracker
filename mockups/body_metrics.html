<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Composición Corporal - GymTracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .mini-metric {
            background: var(--glass);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .mini-metric .label {
            font-size: 11px;
            opacity: 0.6;
            text-transform: uppercase;
        }

        .mini-metric .value {
            font-size: 20px;
            font-weight: 700;
            display: block;
            margin-top: 5px;
        }

        .chart-container {
            background: var(--surface);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
        }

        .chart-placeholder {
            height: 120px;
            width: 100%;
            margin-top: 15px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .bar {
            flex: 1;
            background: var(--primary);
            border-radius: 4px 4px 0 0;
            transition: height 0.3s ease;
        }

        .bar.secondary {
            background: var(--secondary);
        }

        .fab {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: var(--primary);
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(187, 134, 252, 0.4);
            border: none;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Composición Corporal</h1>
        </header>

        <section style="padding: 20px;">
            <!-- Resumen de Métricas -->
            <div class="metrics-grid">
                <div class="mini-metric animate" style="animation-delay: 0.1s;">
                    <span class="label">Peso</span>
                    <span class="value">78.5 kg</span>
                    <span style="font-size: 10px; color: #00e676;">↓ 0.4kg</span>
                </div>
                <div class="mini-metric animate" style="animation-delay: 0.2s;">
                    <span class="label">IMC</span>
                    <span class="value">24.2</span>
                    <span style="font-size: 10px; opacity: 0.5;">Normal</span>
                </div>
                <div class="mini-metric animate" style="animation-delay: 0.3s;">
                    <span class="label">Grasa</span>
                    <span class="value">15.2%</span>
                    <span style="font-size: 10px; color: #00e676;">↓ 0.2%</span>
                </div>
                <div class="mini-metric animate" style="animation-delay: 0.4s;">
                    <span class="label">Músculo</span>
                    <span class="value">38.4%</span>
                    <span style="font-size: 10px; color: var(--primary);">↑ 0.1%</span>
                </div>
            </div>

            <!-- Gráfico de Peso -->
            <div class="chart-container animate" style="animation-delay: 0.5s;">
                <div style="display: flex; justify-content: space-between;">
                    <h3 style="font-size: 14px;">Evolución de Peso</h3>
                    <span style="font-size: 12px; opacity: 0.5;">6 meses</span>
                </div>
                <div class="chart-placeholder">
                    <div class="bar" style="height: 80%;"></div>
                    <div class="bar" style="height: 75%;"></div>
                    <div class="bar" style="height: 78%;"></div>
                    <div class="bar" style="height: 72%;"></div>
                    <div class="bar" style="height: 70%;"></div>
                    <div class="bar" style="height: 65%;"></div>
                </div>
            </div>

            <!-- Gráfico de Composición -->
            <div class="chart-container animate" style="animation-delay: 0.6s;">
                <h3 style="font-size: 14px;">Grasa vs Músculo</h3>
                <div class="chart-placeholder" style="align-items: center; justify-content: space-around;">
                    <div style="text-align: center;">
                        <div
                            style="width: 60px; height: 60px; border-radius: 50%; border: 6px solid var(--secondary); display: flex; align-items: center; justify-content: center;">
                            <span style="font-size: 12px;">15%</span>
                        </div>
                        <span style="font-size: 10px; margin-top: 5px; display: block;">Grasa</span>
                    </div>
                    <div style="text-align: center;">
                        <div
                            style="width: 60px; height: 60px; border-radius: 50%; border: 6px solid var(--primary); display: flex; align-items: center; justify-content: center;">
                            <span style="font-size: 12px;">38%</span>
                        </div>
                        <span style="font-size: 10px; margin-top: 5px; display: block;">Músculo</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Botón Flotante para Registrar (Nueva Captura) -->
        <button class="fab" onclick="location.href='body_capture.html'">+</button>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>Inicio</span>
            </a>
            <a href="routines.html" class="nav-item">
                <span class="nav-icon">📋</span>
                <span>Rutinas</span>
            </a>
            <a href="progression.html" class="nav-item">
                <span class="nav-icon">📈</span>
                <span>Logros</span>
            </a>
            <a href="body_metrics.html" class="nav-item active">
                <span class="nav-icon">⚖️</span>
                <span>Cuerpo</span>
            </a>
        </nav>
    </div>
</body>

</html>
