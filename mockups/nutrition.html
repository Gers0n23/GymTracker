<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrición - GymTracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Nutrición Sencilla</h1>
        </header>

        <section style="padding: 15px;">
            <!-- Punto 4.1 PDF: Cumplimiento Meta Proteica -->
            <div class="card animate" style="background: linear-gradient(135deg, var(--surface), #1b2d4d);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3>Meta Proteica</h3>
                    <span style="color: var(--secondary); font-weight: 700;">160g / 180g</span>
                </div>
                <div style="width: 100%; height: 12px; background: var(--glass); border-radius: 6px; overflow: hidden;">
                    <div
                        style="width: 88%; height: 100%; background: var(--secondary); box-shadow: 0 0 10px var(--secondary);">
                    </div>
                </div>
                <p style="font-size: 11px; opacity: 0.5; margin-top: 10px;">Referencia: 2.0g x kg de peso corporal</p>
            </div>

            <h3 style="margin: 20px 0 15px 5px; font-size: 16px;">Comidas del Día</h3>

            <div class="card animate" style="padding: 15px; margin-bottom: 10px;">
                <div style="display: flex; justify-content: space-between;">
                    <b>Desayuno</b>
                    <span style="opacity: 0.5;">08:30 AM</span>
                </div>
                <p style="font-size: 12px; margin: 5px 0;">3 Huevos, Avena, Whey Protein</p>
                <div style="display: flex; gap: 15px; font-size: 11px; color: var(--primary);">
                    <span>P: 45g</span><span>C: 30g</span><span>G: 12g</span>
                </div>
            </div>

            <div class="card animate"
                style="padding: 15px; border: 1px dashed var(--glass-border); text-align: center;">
                <button class="btn-ghost" style="width: 100%;">+ REGISTRAR COMIDA RÁPIDA</button>
            </div>
        </section>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>Inicio</span>
            </a>
            <a href="nutrition.html" class="nav-item active">
                <span class="nav-icon">🍎</span>
                <span>Comida</span>
            </a>
            <a href="routines.html" class="nav-item">
                <span class="nav-icon">📋</span>
                <span>Rutinas</span>
            </a>
            <a href="body_metrics.html" class="nav-item">
                <span class="nav-icon">⚖️</span>
                <span>Cuerpo</span>
            </a>
        </nav>
    </div>
</body>

</html>
